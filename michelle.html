<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria Live POC</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 16px; }
    p { font-size: 1rem; line-height: 1.6; }
  </style>
</head>
<body>
  <h1 aria-live="polite">Welcome to the Aria Live POC</h1>
  <p aria-live="polite">This is the body text. When this content changes dynamically, a screen reader will announce the update without interrupting the user's current activity.</p>
</body>
</html>
